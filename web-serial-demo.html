<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STServo Web Serial Demo</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #1a1a1a;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      .card {
        background: #2d2d2d;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        max-width: 600px;
        width: 100%;
      }
      h1 {
        color: #00d2ff;
        margin-bottom: 1.5rem;
      }
      .status {
        margin: 1rem 0;
        padding: 0.5rem;
        border-radius: 4px;
        background: #3d3d3d;
      }
      .connected {
        color: #00ff88;
      }
      .disconnected {
        color: #ff4444;
      }
      button {
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s;
        margin: 5px;
      }
      button:hover {
        transform: translateY(-2px);
      }
      button:disabled {
        background: #555;
        cursor: not-allowed;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 1.5rem;
      }
      input {
        background: #3d3d3d;
        border: 1px solid #555;
        color: white;
        padding: 5px;
        border-radius: 4px;
      }
      label {
        font-size: 0.9rem;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>STServo Web Serial</h1>
      <div id="status" class="status disconnected">Status: Not Connected</div>

      <button id="connectBtn">Connect to Servo Port</button>
      <button id="pingBtn" disabled>Ping Servo (ID 1)</button>

      <div class="controls">
        <div>
          <label>Servo ID</label><br />
          <input type="number" id="servoId" value="1" min="0" max="253" />
        </div>
        <div>
          <label>Position (0-4095)</label><br />
          <input type="number" id="posValue" value="2048" min="0" max="4095" />
        </div>
      </div>
      <button id="moveBtn" disabled style="width: 100%; margin-top: 10px">
        Move to Position
      </button>

      <div
        id="log"
        style="
          margin-top: 1.5rem;
          font-family: monospace;
          font-size: 0.8rem;
          background: #000;
          padding: 10px;
          height: 150px;
          overflow-y: auto;
          border-radius: 4px;
        "
      >
        > System ready.
      </div>
    </div>

    <script>
      let port;
      let reader;
      let writer;
      let connected = false;

      const connectBtn = document.getElementById("connectBtn");
      const pingBtn = document.getElementById("pingBtn");
      const moveBtn = document.getElementById("moveBtn");
      const statusDiv = document.getElementById("status");
      const logDiv = document.getElementById("log");

      function log(msg) {
        const entry = document.createElement("div");
        entry.textContent = `> ${msg}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      connectBtn.addEventListener("click", async () => {
        if ("serial" in navigator) {
          try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 }); // STS default is often 1M, change as needed

            connected = true;
            statusDiv.textContent = "Status: Connected";
            statusDiv.className = "status connected";
            pingBtn.disabled = false;
            moveBtn.disabled = false;
            log("Connected successfully!");
          } catch (err) {
            log("Connection failed: " + err);
          }
        } else {
          alert(
            "Web Serial API not supported in this browser. Please use Chrome or Edge.",
          );
        }
      });

      async function sendCommand(id, instruction, params = []) {
        if (!port) return;

        const length = params.length + 2;
        const packet = [0xff, 0xff, id, length, instruction, ...params];

        let checksum = 0;
        for (let i = 2; i < packet.length; i++) {
          checksum += packet[i];
        }
        packet.push(~checksum & 0xff);

        const writer = port.writable.getWriter();
        await writer.write(new Uint8Array(packet));
        writer.releaseLock();

        log(
          `Sent: ${packet.map((b) => b.toString(16).padStart(2, "0")).join(" ")}`,
        );
      }

      pingBtn.addEventListener("click", async () => {
        const id = parseInt(document.getElementById("servoId").value);
        log(`Pinging Servo ${id}...`);
        await sendCommand(id, 0x01); // INST_PING
      });

      moveBtn.addEventListener("click", async () => {
        const id = parseInt(document.getElementById("servoId").value);
        const pos = parseInt(document.getElementById("posValue").value);

        // STS Write Position (Address 42, 2 bytes)
        // Format for WritePosEx (Address 41, 7 bytes): Acc, PosL, PosH, TimeL, TimeH, SpdL, SpdH
        const acc = 50;
        const speed = 100;
        const params = [
          acc,
          pos & 0xff,
          (pos >> 8) & 0xff,
          0,
          0, // Time
          speed & 0xff,
          (speed >> 8) & 0xff,
        ];

        log(`Moving Servo ${id} to ${pos}...`);
        await sendCommand(id, 0x03, [41, ...params]); // INST_WRITE starting at Address 41
      });
    </script>
  </body>
</html>
